<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EliteTV | Ultra Pro Streaming</title>
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #f90d00;
            --bg: #050507;
            --surface: #111115;
            --glass: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-sec: #94a3b8;
        }

        body.light-mode {
            --bg: #f8fafc;
            --surface: #ffffff;
            --text-main: #0f172a;
            --text-sec: #64748b;
            --border: rgba(0, 0, 0, 0.1);
            --glass: rgba(0, 0, 0, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text-main); overflow-x: hidden; transition: 0.3s ease; }

        /* --- Header --- */
        header {
            position: sticky; top: 0; z-index: 1000; background: var(--bg);
            backdrop-filter: blur(20px); padding: 0 5%; display: flex;
            justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border);
            height: 70px;
        }
        .brand { font-size: 1.6rem; font-weight: 900; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .brand span { background: linear-gradient(to right, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .header-right { display: flex; align-items: center; gap: 8px; }
        .icon-btn { 
            background: var(--glass); border: 1px solid var(--border); 
            color: var(--text-main); padding: 10px; border-radius: 12px; 
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        #search-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); display: none; align-items: center; padding: 0 5%;
            z-index: 1100; gap: 15px;
        }
        #search-input { flex: 1; background: transparent; border: none; color: var(--text-main); font-size: 1.1rem; outline: none; }

        /* --- Categories --- */
        .cat-nav { position: sticky; top: 70px; z-index: 900; background: var(--bg); padding: 12px 0; border-bottom: 1px solid var(--border); }
        .categories { display: flex; gap: 10px; overflow-x: auto; padding: 0 5%; scrollbar-width: none; }
        .chip { padding: 10px 22px; background: var(--surface); border: 1px solid var(--border); border-radius: 50px; cursor: pointer; white-space: nowrap; font-size: 0.85rem; font-weight: 700; color: var(--text-sec); }
        .chip.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* --- Grid --- */
        .grid { display: grid; padding: 1rem 5% 100px; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .card { background: var(--surface); border-radius: 20px; border: 1px solid var(--border); overflow: hidden; cursor: pointer; transition: 0.3s; position: relative; }
        .card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .card .poster-box { width: 100%; aspect-ratio: 1/1; background: #000; padding: 25px; display: flex; align-items: center; justify-content: center; }
        .card img { max-width: 90%; max-height: 90%; object-fit: contain; }
        .live-tag { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.6); padding: 3px 7px; border-radius: 5px; display: flex; align-items: center; gap: 4px; font-size: 0.55rem; font-weight: 800; color: #fff; }
        .dot { width: 6px; height: 6px; background: var(--primary); border-radius: 50%; animation: blink 1.2s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }
        .card-info { padding: 10px; text-align: center; }
        .card-info h3 { font-size: 0.85rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-main); }

        /* --- PLAYER OVERLAY RE-ENGINEERED --- */
        #player-overlay { 
            position: fixed; inset: 0; background: #000; z-index: 5000; 
            display: none; flex-direction: column; 
        }
        
        .video-wrapper { 
            width: 100%; 
            height: 70vh; /* Massive on PC */
            background: #000; 
            position: relative;
            flex-shrink: 0;
        }

        @media (max-width: 768px) {
            .video-wrapper { 
                height: 42vh; /* Large on Mobile */
            }
        }

        video { width: 100%; height: 100%; background: #000; display: block; object-fit: contain; }

        .controls-wrapper { 
            position: absolute; inset: 0; display: flex; flex-direction: column; 
            justify-content: space-between; transition: opacity 0.4s ease; opacity: 0; 
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent 40%, rgba(0,0,0,0.9));
            z-index: 20;
        }
        .video-wrapper.show-controls .controls-wrapper { opacity: 1; }

        /* Cinematic Header */
        .p-header { padding: 25px; display: flex; align-items: center; gap: 15px; }
        .p-back-circle { width: 42px; height: 42px; border-radius: 50%; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .p-red-pipe { width: 4px; height: 30px; background: var(--primary); border-radius: 2px; }
        .p-name { font-weight: 800; font-size: 1.3rem; color: #fff; text-shadow: 0 2px 10px #000; }

        /* Progress & Controls */
        .p-bottom { padding: 25px; width: 100%; }
        .progress-area { width: 100%; height: 6px; background: rgba(255,255,255,0.2); border-radius: 10px; margin-bottom: 15px; cursor: pointer; }
        .progress-bar { height: 100%; background: var(--primary); width: 0%; border-radius: 10px; }
        
        .p-controls-row { display: flex; justify-content: space-between; align-items: center; color: #fff; }
        .p-group { display: flex; align-items: center; gap: 20px; }
        .p-icon { cursor: pointer; }
        .timer { font-size: 0.9rem; font-weight: 600; }

        .quality-menu { position: absolute; bottom: 90px; right: 25px; background: #111; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; display: none; min-width: 150px; z-index: 30; }
        .q-item { padding: 12px 18px; font-size: 0.9rem; font-weight: 700; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .q-item.active { background: var(--primary); }

        /* Scrollable Suggestions */
        .player-content-scroll {
            flex-grow: 1;
            overflow-y: auto;
            background: var(--bg);
            padding: 25px 5%;
        }
        .suggestion-title { font-size: 1.2rem; font-weight: 800; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }

        /* --- Modals & Nav --- */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 75px; background: var(--bg); backdrop-filter: blur(20px); border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 2000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-sec); cursor: pointer; font-size: 0.7rem; font-weight: 800; gap: 4px; }
        .nav-item.active { color: var(--primary); }

        #importModal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 6000; display: none; align-items: center; justify-content: center; padding: 20px; }
        
        .spinner { width: 45px; height: 45px; border: 4px solid rgba(255,255,255,0.1); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body id="body-main">

    <header>
        <div class="brand" onclick="loadBaseM3U()">
            <i data-lucide="tv" size="30"></i>
            <span>EliteTV</span>
        </div>
        
        <div class="header-right">
            <div class="icon-btn" onclick="toggleSearch(true)">
                <i data-lucide="search" size="20"></i>
            </div>
            <div class="icon-btn" onclick="toggleTheme()">
                <i data-lucide="moon" id="theme-icon" size="20"></i>
            </div>
        </div>

        <div id="search-overlay">
            <i data-lucide="search" size="20" color="var(--text-sec)"></i>
            <input type="text" id="search-input" placeholder="Search channels..." oninput="handleSearch()">
            <i data-lucide="x" size="24" style="cursor:pointer" onclick="toggleSearch(false)"></i>
        </div>
    </header>

    <div class="cat-nav">
        <div id="categories" class="categories"></div>
    </div>

    <div id="channel-grid" class="grid">
        <div style="grid-column: 1/-1; text-align: center; padding: 100px;">
            <div class="spinner" style="margin: 0 auto;"></div>
            <p style="margin-top: 20px; color: var(--text-sec); font-weight: 600;">EliteTV is Loading...</p>
        </div>
    </div>

    <!-- RE-ENGINEERED PLAYER OVERLAY -->
    <div id="player-overlay">
        <!-- Video stays locked at top -->
        <div class="video-wrapper" id="v-wrap">
            <div id="video-loader" style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background:#000; z-index:15;"><div class="spinner"></div></div>
            <video id="video" playsinline></video>
            
            <div class="controls-wrapper">
                <div class="p-header">
                    <div class="p-back-circle" onclick="closePlayer()">
                        <i data-lucide="arrow-left" color="white" size="24"></i>
                    </div>
                    <div class="p-red-pipe"></div>
                    <div class="p-name" id="p-name-txt">Loading...</div>
                </div>

                <div class="p-bottom">
                    <div class="progress-area" id="p-container">
                        <div class="progress-bar" id="p-bar"></div>
                    </div>
                    <div class="p-controls-row">
                        <div class="p-group">
                            <i data-lucide="play" id="play-btn" class="p-icon" onclick="togglePlay()"></i>
                            <i data-lucide="volume-2" id="mute-btn" class="p-icon" onclick="toggleMute()"></i>
                            <span class="timer" id="time-display">00:00 / 00:00</span>
                        </div>
                        <div class="p-group">
                            <i data-lucide="settings" class="p-icon" onclick="toggleSettings()"></i>
                            <i data-lucide="maximize" class="p-icon" onclick="toggleFullScreen()"></i>
                        </div>
                    </div>
                </div>
                <div class="quality-menu" id="quality-menu"></div>
            </div>
        </div>

        <!-- Scrollable Suggestions Area -->
        <div class="player-content-scroll">
            <h2 class="suggestion-title" id="s-title"><i data-lucide="sparkles" color="var(--primary)"></i> Similar Channels</h2>
            <div id="suggestion-grid" class="grid" style="padding: 0;"></div>
        </div>
    </div>

    <!-- Bottom Nav -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="loadBaseM3U()"><i data-lucide="home"></i><span>HOME</span></div>
        <div class="nav-item" onclick="toggleModal(true)"><i data-lucide="plus-circle"></i><span>IMPORT</span></div>
    </div>

    <!-- Import Modal -->
    <div id="importModal">
        <div style="background:var(--surface); border:1px solid var(--border); width:100%; max-width:400px; padding:2.5rem; border-radius:32px; text-align:center;">
            <h2 style="font-weight: 800; margin-bottom: 20px;">Import M3U</h2>
            <input type="text" id="m3uUrl" placeholder="Enter URL..." style="width:100%; padding:14px; border-radius:12px; background:var(--bg); border:1px solid var(--border); color:white; margin-bottom:15px; outline:none;">
            <div onclick="document.getElementById('fileInput').click()" style="border:2px dashed var(--border); padding:30px; border-radius:20px; margin-bottom:20px; cursor:pointer;">
                <i data-lucide="upload-cloud" size="32"></i>
                <p style="font-size: 0.85rem; margin-top:10px; font-weight: 700;">Upload Local File</p>
            </div>
            <input type="file" id="fileInput" style="display:none" accept=".m3u" onchange="loadFile(event)">
            <button onclick="loadUrl()" style="width:100%; padding:16px; border-radius:16px; background:var(--primary); color:white; border:none; font-weight:800; cursor:pointer;">LOAD PLAYLIST</button>
            <p onclick="toggleModal(false)" style="margin-top:20px; color:var(--text-sec); cursor:pointer;">Close</p>
        </div>
    </div>

    <script>
        const PROXY = 'https://yashiptvplaylist.bgmihackerr12.workers.dev/?url='; 
        const BASE_M3U = 'https://yashlivetv.fun/app/tsjio_playlist.m3u';
        let hls = null, allChannels = [], currentGroup = "";
        const video = document.getElementById('video');
        const vWrap = document.getElementById('v-wrap');

        lucide.createIcons();

        function toggleSearch(show) {
            const overlay = document.getElementById('search-overlay');
            overlay.style.display = show ? 'flex' : 'none';
            if(show) document.getElementById('search-input').focus();
        }

        let controlTimer;
        function showControls() {
            vWrap.classList.add('show-controls');
            clearTimeout(controlTimer);
            controlTimer = setTimeout(() => {
                if (!video.paused) vWrap.classList.remove('show-controls');
            }, 3000);
        }
        vWrap.addEventListener('mousemove', showControls);
        vWrap.addEventListener('touchstart', showControls);

        window.onload = () => fetchPlaylist(BASE_M3U);
        function loadBaseM3U() { closePlayer(); fetchPlaylist(BASE_M3U); }

        async function fetchPlaylist(url) {
            try {
                const response = await fetch(PROXY + encodeURIComponent(url));
                const data = await response.text();
                parseM3U(data);
            } catch (e) { console.error("Error", e); }
        }

        function parseM3U(content) {
            const channels = [];
            let current = null;
            content.split('\n').forEach(line => {
                line = line.trim();
                if (line.startsWith('#EXTINF:')) {
                    current = { 
                        name: line.split(',')[1] || "Unknown Channel", 
                        logo: line.match(/tvg-logo="([^"]+)"/)?.[1] || '',
                        group: line.match(/group-title="([^"]+)"/)?.[1] || 'General'
                    };
                } else if (line.startsWith('http')) {
                    if (current) { current.url = line; channels.push(current); current = null; }
                }
            });
            allChannels = channels;
            renderCategories();
            renderGrid(allChannels, 'channel-grid');
        }

        function renderGrid(list, target, isMini = false) {
            const grid = document.getElementById(target);
            grid.innerHTML = list.slice(0, isMini ? 12 : 400).map(ch => `
                <div class="card" onclick="playStream('${ch.url}', '${ch.name.replace(/'/g, "\\'")}', '${ch.group}')">
                    <div class="live-tag"><div class="dot"></div> LIVE</div>
                    <div class="poster-box"><img src="${ch.logo}" onerror="this.src='https://img.icons8.com/fluency/96/monitor.png'"></div>
                    <div class="card-info"><h3>${ch.name}</h3></div>
                </div>
            `).join('');
        }

        function renderCategories() {
            const cats = ['All', ...new Set(allChannels.map(c => c.group))];
            document.getElementById('categories').innerHTML = cats.map(cat => `
                <div class="chip ${cat === 'All' ? 'active' : ''}" onclick="filterCat(this, '${cat}')">${cat}</div>
            `).join('');
        }

        function filterCat(el, cat) {
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            renderGrid(cat === 'All' ? allChannels : allChannels.filter(c => c.group === cat), 'channel-grid');
        }

        function playStream(url, name, group) {
            document.getElementById('p-name-txt').innerText = name;
            document.getElementById('player-overlay').style.display = 'flex';
            document.getElementById('video-loader').style.display = 'flex';
            currentGroup = group;

            if (hls) hls.destroy();
            if (Hls.isSupported()) {
                hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => { video.play(); setupQuality(); });
            } else { video.src = url; video.play(); }

            const suggestions = allChannels.filter(c => c.group === group && c.name !== name);
            document.getElementById('s-title').innerHTML = `<i data-lucide="sparkles" color="var(--primary)"></i> More from ${group}`;
            renderGrid(suggestions, 'suggestion-grid', true);
            lucide.createIcons();
            document.querySelector('.player-content-scroll').scrollTo(0,0);
            showControls();
        }

        function setupQuality() {
            const menu = document.getElementById('quality-menu');
            const sortedLevels = hls.levels.map((l, i) => ({...l, index: i})).sort((a, b) => b.height - a.height);
            menu.innerHTML = sortedLevels.map(l => {
                let label = l.height;
                if(l.height >= 1080) label = "1080 FHD";
                else if(l.height >= 720) label = "720 HD";
                else if(l.height >= 480) label = "480 SD";
                return `<div class="q-item ${hls.currentLevel === l.index ? 'active' : ''}" onclick="hls.currentLevel=${l.index}; toggleSettings()">${label}</div>`;
            }).join('');
        }

        video.addEventListener('timeupdate', () => {
            const pBar = document.getElementById('p-bar');
            const timeDisplay = document.getElementById('time-display');
            if (video.duration) {
                pBar.style.width = (video.currentTime / video.duration) * 100 + '%';
                timeDisplay.innerText = formatTime(video.currentTime) + " / " + formatTime(video.duration);
            } else { timeDisplay.innerText = "LIVE"; pBar.style.width = '100%'; }
        });

        function formatTime(s) {
            let m = Math.floor(s / 60); let sec = Math.floor(s % 60);
            return (m < 10 ? '0'+m : m) + ":" + (sec < 10 ? '0'+sec : sec);
        }

        video.onplaying = () => document.getElementById('video-loader').style.display = 'none';

        function togglePlay() { 
            video.paused ? video.play() : video.pause(); 
            document.getElementById('play-btn').setAttribute('data-lucide', video.paused ? 'play' : 'pause');
            lucide.createIcons();
        }

        function toggleMute() { 
            video.muted = !video.muted; 
            document.getElementById('mute-btn').setAttribute('data-lucide', video.muted ? 'volume-x' : 'volume-2');
            lucide.createIcons();
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) vWrap.requestFullscreen();
            else document.exitFullscreen();
        }

        function closePlayer() { video.pause(); document.getElementById('player-overlay').style.display = 'none'; }
        function toggleSettings() { const m = document.getElementById('quality-menu'); m.style.display = m.style.display === 'block' ? 'none' : 'block'; }
        function toggleModal(s) { document.getElementById('importModal').style.display = s ? 'flex' : 'none'; }
        function loadUrl() { const u = document.getElementById('m3uUrl').value; if(u) { fetchPlaylist(u); toggleModal(false); } }
        function loadFile(e) {
            const reader = new FileReader();
            reader.onload = (ev) => { parseM3U(ev.target.result); toggleModal(false); };
            reader.readAsText(e.target.files[0]);
        }

        function handleSearch() {
            const q = document.getElementById('search-input').value.toLowerCase();
            renderGrid(allChannels.filter(c => c.name.toLowerCase().includes(q)), 'channel-grid');
        }

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const icon = document.getElementById('theme-icon');
            icon.setAttribute('data-lucide', document.body.classList.contains('light-mode') ? 'sun' : 'moon');
            lucide.createIcons();
        }

        window.addEventListener('keydown', (e) => {
            if (document.getElementById('player-overlay').style.display === 'flex') {
                if (e.key.toLowerCase() === 'f') toggleFullScreen();
                if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
            }
        });
    </script>
</body>
</html>
