<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EliteTV | Ultra Streaming</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1; --accent: #f90d00; --bg: #030712;
            --card-bg: #111827; --glass: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.08);
        }

        /* --- Global Styles --- */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        body { 
            background-color: var(--bg); color: white; 
            overflow-x: hidden; scrollbar-width: none; /* Firefox */
        }
        /* Hide Scrollbar for Chrome, Safari and Opera */
        ::-webkit-scrollbar { display: none; }

        /* --- Header --- */
        header {
            position: sticky; top: 0; z-index: 1000; background: rgba(3, 7, 18, 0.9);
            backdrop-filter: blur(20px); padding: 1rem 5%; display: flex;
            justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border);
        }
        .brand { font-size: 1.6rem; font-weight: 800; color: var(--primary); display: flex; align-items: center; gap: 10px; cursor: pointer; }

        .btn-import { background: var(--primary); color: white; border: none; padding: 10px 18px; border-radius: 10px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; }

        /* --- Categories --- */
        .categories { display: flex; gap: 10px; overflow-x: auto; padding: 1.2rem 5%; scrollbar-width: none; }
        .chip { padding: 8px 18px; background: var(--glass); border: 1px solid var(--border); border-radius: 50px; cursor: pointer; white-space: nowrap; font-size: 0.85rem; transition: 0.3s; }
        .chip.active { background: var(--primary); border-color: var(--primary); box-shadow: 0 0 15px rgba(99, 102, 241, 0.3); }

        /* --- Grid --- */
        .grid { display: grid; padding: 0 5% 50px; grid-template-columns: repeat(auto-fill, minmax(135px, 1fr)); gap: 15px; }
        .card { background: var(--card-bg); border-radius: 14px; border: 1px solid var(--border); overflow: hidden; cursor: pointer; transition: 0.3s ease; position: relative; }
        .card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .card .poster { width: 100%; aspect-ratio: 16/10; object-fit: contain; background: #000; padding: 8px; }
        .card h3 { font-size: 0.8rem; padding: 10px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Live Badge */
        .live-badge {
            position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.6);
            padding: 3px 8px; border-radius: 6px; font-size: 0.65rem; font-weight: 800;
            display: flex; align-items: center; gap: 5px; backdrop-filter: blur(5px);
        }
        .dot { width: 6px; height: 6px; background-color: var(--accent); border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }

        /* --- Optimized Player Overlay --- */
        #player-overlay { 
            position: fixed; inset: 0; background: var(--bg); z-index: 5000; 
            display: none; flex-direction: column; overflow-y: auto; scrollbar-width: none;
        }
        #player-overlay::-webkit-scrollbar { display: none; }

        .video-wrapper { 
            width: 100%; max-width: 1000px; margin: 0 auto; 
            aspect-ratio: 16/9; background: #000; position: sticky; top: 0; z-index: 10;
        }
        video { width: 100%; height: 100%; display: block; }
        
        #video-loader { position: absolute; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 5; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Player Header */
        .p-header { 
            position: absolute; top: 15px; left: 15px; z-index: 100; 
            display: flex; align-items: center; gap: 10px; 
        }
        .p-title { font-weight: 800; font-size: 1.1rem; text-transform: uppercase; color: white; display: flex; align-items: center; gap: 8px; }
        .p-pipe { color: var(--accent); font-weight: 900; font-size: 1.4rem; }

        /* Settings Dropdown */
        .settings-btn { position: absolute; bottom: 15px; right: 15px; background: rgba(0,0,0,0.5); border: none; color: white; padding: 8px; border-radius: 50%; cursor: pointer; z-index: 20; }
        #settings-menu { 
            position: absolute; bottom: 60px; right: 15px; background: #111; border: 1px solid var(--border);
            border-radius: 12px; padding: 10px; display: none; z-index: 30; width: 180px; box-shadow: 0 10px 25px #000;
        }
        .setting-item { padding: 10px; font-size: 0.8rem; cursor: pointer; border-radius: 8px; }
        .setting-item:hover { background: var(--primary); }

        /* Import Modal */
        #import-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 6000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--card-bg); border: 1px solid var(--border); width: 100%; max-width: 400px; padding: 2rem; border-radius: 20px; }
        
        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: rgba(10,10,10,0.95); backdrop-filter: blur(20px); border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 900; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #555; cursor: pointer; font-size: 0.7rem; font-weight: 700; }
        .nav-item.active { color: var(--primary); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header>
        <div class="brand" onclick="location.reload()"><i data-lucide="tv"></i> EliteTV</div>
        <div class="header-actions">
            <button class="btn-import" onclick="openImport()"><i data-lucide="plus-circle"></i> Import</button>
        </div>
    </header>

    <div id="categories" class="categories"></div>
    <div id="channel-grid" class="grid"></div>

    <!-- Import Modal -->
    <div id="import-modal">
        <div class="modal-content">
            <h3 style="margin-bottom:15px">External Playlist</h3>
            <input type="text" id="m3uUrl" placeholder="Enter M3U Link..." style="width: 100%; padding: 12px; border-radius: 10px; background: #000; border: 1px solid var(--border); color: white; margin-bottom: 10px; outline:none;">
            <button class="btn-import" style="width: 100%; justify-content: center;" onclick="loadFromUrl()">Fetch Network</button>
            <div style="text-align:center; margin:10px; color:#444">OR</div>
            <button class="btn-import" style="width: 100%; justify-content: center; background: #222" onclick="document.getElementById('fileInput').click()">Upload Local M3U</button>
            <input type="file" id="fileInput" class="hidden" accept=".m3u" onchange="loadFromFile(event)">
            <button onclick="closeImport()" style="width: 100%; margin-top: 15px; background: transparent; border: none; color: var(--accent); cursor:pointer; font-weight: 800;">Cancel</button>
        </div>
    </div>

    <!-- Pro Player Overlay -->
    <div id="player-overlay">
        <div class="video-wrapper">
            <div id="video-loader"><div class="spinner"></div></div>
            <video id="video" playsinline></video>
            <div class="p-header">
                <i data-lucide="arrow-left" onclick="closePlayer()" style="cursor:pointer; background:rgba(0,0,0,0.5); border-radius:50%; padding:5px;"></i>
                <div class="p-title"><span class="p-pipe">|</span> <span id="p-name">CHANNEL</span></div>
            </div>
            <button class="settings-btn" onclick="toggleSettings()"><i data-lucide="settings"></i></button>
            <div id="settings-menu"></div>
        </div>
        
        <div style="padding: 25px 5%; background: var(--bg);">
            <h4 style="color: var(--primary); margin-bottom: 20px; font-weight: 800; display: flex; align-items: center; gap: 8px;">
                <i data-lucide="layers" size="18"></i> Similar Channels
            </h4>
            <div id="suggestion-grid" class="grid" style="padding: 0;"></div>
        </div>
    </div>

    <!-- Bottom Nav -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="location.reload()"><i data-lucide="home"></i><span>HOME</span></div>
        <div class="nav-item" onclick="openImport()"><i data-lucide="plus-square"></i><span>IMPORT</span></div>
    </div>

    <script>
        // 1. WORKER & PROXY CONFIG
        const CF_WORKER = 'https://yashiptvplaylist.bgmihackerr12.workers.dev/?url='; 
        const FALLBACK = 'https://api.corsproxy.io/?url=';
        const JIO_M3U = 'https://yashlivetv.fun/app/tsjio_playlist.m3u';
        
        let allChannels = [];
        let hls = null;

        lucide.createIcons();
        window.onload = () => fetchPlaylist(JIO_M3U);

        // 2. STABLE FETCH LOGIC
        async function fetchPlaylist(url) {
            const grid = document.getElementById('channel-grid');
            grid.innerHTML = '<p style="padding:20px; opacity:0.5;">Establishing secure connection...</p>';

            const fetchData = async (proxy) => {
                const response = await fetch(proxy + encodeURIComponent(url));
                if (!response.ok) throw new Error();
                return await response.text();
            };

            try {
                let data;
                try {
                    data = await fetchData(CF_WORKER);
                } catch (e) {
                    data = await fetchData(FALLBACK);
                }
                
                if (data && data.includes("#EXTM3U")) {
                    parseM3U(data);
                } else {
                    throw new Error();
                }
            } catch (err) {
                grid.innerHTML = '<p style="padding:20px; color:red;">Source protected or link dead. Try Import.</p>';
            }
        }

        // 3. ROBUST PARSER (Handles External M3Us better)
        function parseM3U(content) {
            const lines = content.split('\n');
            const channels = [];
            let current = null;

            for (let i = 0; i < lines.length; i++) {
                let line = lines[i].trim();
                if (line.startsWith('#EXTINF:')) {
                    const name = line.split(',')[1] || "Unnamed";
                    const logo = line.match(/tvg-logo="([^"]+)"/)?.[1] || '';
                    const group = line.match(/group-title="([^"]+)"/)?.[1] || 'General';
                    current = { name: name.trim(), logo, group };
                } else if (line.startsWith('http') && current) {
                    current.url = line;
                    channels.push(current);
                    current = null;
                }
            }
            allChannels = channels;
            renderCategories();
            renderGrid(allChannels, 'channel-grid');
        }

        function renderGrid(list, target, isSug = false) {
            const container = document.getElementById(target);
            container.innerHTML = '';
            const items = isSug ? list.slice(0, 18) : list.slice(0, 800);
            items.forEach(ch => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    <div class="live-badge"><div class="dot"></div> LIVE</div>
                    <img class="poster" src="${ch.logo}" loading="lazy" onerror="this.src='https://img.icons8.com/fluency/96/monitor.png'">
                    <h3>${ch.name}</h3>`;
                div.onclick = () => playStream(ch);
                container.appendChild(div);
            });
        }

        function renderCategories() {
            const cats = ['All', ...new Set(allChannels.map(c => c.group))];
            const container = document.getElementById('categories');
            container.innerHTML = '';
            cats.forEach(cat => {
                const div = document.createElement('div');
                div.className = 'chip' + (cat === 'All' ? ' active' : '');
                div.innerText = cat;
                div.onclick = () => {
                    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
                    div.classList.add('active');
                    renderGrid(cat === 'All' ? allChannels : allChannels.filter(c => c.group === cat), 'channel-grid');
                };
                container.appendChild(div);
            });
        }

        function playStream(ch) {
            const video = document.getElementById('video');
            const loader = document.getElementById('video-loader');
            const overlay = document.getElementById('player-overlay');
            overlay.style.display = 'flex';
            document.getElementById('p-name').innerText = ch.name;
            loader.style.display = 'flex';

            if (hls) hls.destroy();

            if (Hls.isSupported()) {
                hls = new Hls();
                hls.loadSource(ch.url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play();
                    setupQualityMenu();
                });
            } else {
                video.src = ch.url;
            }

            video.onplaying = () => loader.style.display = 'none';
            video.onwaiting = () => loader.style.display = 'flex';

            renderGrid(allChannels.filter(c => c.group === ch.group && c.name !== ch.name), 'suggestion-grid', true);
            overlay.scrollTo({top: 0, behavior: 'smooth'});
        }

        function setupQualityMenu() {
            const menu = document.getElementById('settings-menu');
            menu.innerHTML = '<div style="font-size:0.6rem; color:#555; font-weight:800; margin-bottom:5px;">STREAM SETTINGS</div>';
            hls.levels.forEach((l, i) => {
                const div = document.createElement('div');
                div.className = 'setting-item'; div.innerText = l.height + 'p';
                div.onclick = () => { hls.currentLevel = i; toggleSettings(); };
                menu.appendChild(div);
            });
            if(hls.audioTracks.length > 1) {
                hls.audioTracks.forEach((t, i) => {
                    const div = document.createElement('div');
                    div.className = 'setting-item'; div.innerText = 'Audio: ' + (t.name || i);
                    div.onclick = () => { hls.audioTrack = i; toggleSettings(); };
                    menu.appendChild(div);
                });
            }
        }

        function toggleSettings() { const m = document.getElementById('settings-menu'); m.style.display = m.style.display === 'block' ? 'none' : 'block'; }
        function closePlayer() { document.getElementById('video').pause(); document.getElementById('player-overlay').style.display = 'none'; }
        function openImport() { document.getElementById('import-modal').style.display = 'flex'; }
        function closeImport() { document.getElementById('import-modal').style.display = 'none'; }
        function loadFromUrl() { const u = document.getElementById('m3uUrl').value; if(u) { fetchPlaylist(u); closeImport(); }}
        function loadFromFile(e) { const r = new FileReader(); r.onload = x => { parseM3U(x.target.result); closeImport(); }; r.readAsText(e.target.files[0]); }
    </script>
</body>
</html>
