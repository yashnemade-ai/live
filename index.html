<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>StreamX | TV</title>
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #f90d00;
            --bg: #050507;
            --surface: #111115;
            --glass: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-sec: #94a3b8;
            --logo-shadow: rgba(249, 13, 0, 0.6);
            --card-shadow: 0 10px 30px rgba(0,0,0,0.9);
            --live-bg: rgba(0,0,0,0.6);
            --card-poster-bg: #000000;
        }

        body.light-mode {
            --bg: #f8fafc;
            --surface: #ffffff;
            --text-main: #0f172a;
            --text-sec: #64748b;
            --border: rgba(0, 0, 0, 0.1);
            --glass: rgba(0, 0, 0, 0.05);
            --logo-shadow: rgba(0, 0, 0, 0.15);
            --card-shadow: 0 10px 30px rgba(0,0,0,0.5);
            --live-bg: #ffffff;
            --card-poster-bg: #ffffff;
        }

        /* --- Global --- */
        * { scrollbar-width: none; -ms-overflow-style: none; }
        *::-webkit-scrollbar { display: none; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text-main); overflow-x: hidden; transition: 0.3s ease; }

        /* --- Header --- */
        header {
            position: sticky; top: 0; z-index: 1000; background: var(--bg);
            backdrop-filter: blur(25px); padding: 0 5%; display: flex;
            justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border);
            height: 70px;
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .brand { font-size: 1.6rem; font-weight: 900; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .brand i { color: var(--text-main); filter: drop-shadow(0 2px 4px var(--logo-shadow)); }
        .brand span { 
            background: linear-gradient(to right, var(--text-main), var(--primary)); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            filter: drop-shadow(0 2px 6px var(--logo-shadow));
        }

        .hamburger { cursor: pointer; display: flex; align-items: center; padding: 8px; border-radius: 10px; transition: 0.2s; }
        .hamburger:hover { background: var(--glass); }

        .header-center-search { flex: 0 1 450px; background: var(--glass); border: 1px solid var(--border); padding: 8px 18px; border-radius: 50px; display: flex; align-items: center; gap: 10px; }
        .header-center-search input { background: transparent; border: none; color: var(--text-main); outline: none; width: 100%; font-size: 0.95rem; }

        .header-right { display: flex; align-items: center; gap: 10px; }
        .icon-btn { background: var(--glass); border: 1px solid var(--border); color: var(--text-main); padding: 10px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .search-icon-mobile { display: none; }

        #search-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: none; align-items: center; padding: 0 5%; z-index: 1100; gap: 15px; }
        #search-overlay input { flex: 1; background: transparent; border: none; color: var(--text-main); font-size: 1.1rem; outline: none; }

        @media (max-width: 768px) { .header-center-search { display: none; } .search-icon-mobile { display: flex; } }

        /* --- Sidebar --- */
        #sidebar { position: fixed; top: 0; left: -320px; width: 320px; height: 100%; background: var(--surface); z-index: 5500; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-right: 1px solid var(--border); padding: 40px 25px; }
        #sidebar.open { left: 0; }
        .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 5400; display: none; backdrop-filter: blur(4px); }
        .about-box { background: var(--bg); padding: 22px; border-radius: 20px; border: 1px solid var(--border); margin-top: 20px; }
        .dev-tag { margin-top: 20px; font-weight: 800; font-size: 0.9rem; color: var(--primary); display: flex; align-items: center; gap: 8px; }

        /* --- Cards --- */
        .cat-nav { position: sticky; top: 70px; z-index: 900; background: var(--bg); padding: 12px 0; border-bottom: 1px solid var(--border); }
        .categories { display: flex; gap: 12px; overflow-x: auto; padding: 0 5%; }
        .chip { padding: 10px 22px; background: var(--surface); border: 1px solid var(--border); border-radius: 50px; cursor: pointer; white-space: nowrap; font-size: 0.8rem; font-weight: 700; color: var(--text-sec); }
        .chip.active { background: var(--primary); color: white; border: none; }

        .grid { display: grid; padding: 1rem 5% 100px; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; }
        .card { background: var(--surface); border-radius: 24px; border: 1px solid var(--border); overflow: hidden; cursor: pointer; transition: 0.3s; position: relative; box-shadow: var(--card-shadow); }
        .card:hover { transform: translateY(-8px) scale(1.03); border: 2px solid var(--primary); box-shadow: 0 0 20px var(--primary); }
        .card .poster-box { width: 100%; aspect-ratio: 1/1; background: var(--card-poster-bg); padding: 25px; display: flex; align-items: center; justify-content: center; }
        .card img { max-width: 90%; max-height: 90%; object-fit: contain; }
        .live-tag { position: absolute; top: 12px; right: 12px; background: var(--live-bg); padding: 4px 10px; border-radius: 8px; display: flex; align-items: center; gap: 5px; font-size: 0.6rem; font-weight: 900; color: var(--text-main); border: 1px solid var(--border); }
        .dot { width: 6px; height: 6px; background: var(--primary); border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }
        .card-info { padding: 12px; text-align: center; }
        .card-info h3 { font-size: 0.85rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* --- PLAYER --- */
        #player-overlay { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; flex-direction: column; overflow-y: auto; }
        .video-wrapper { width: 100%; height: 68vh; background: #000; position: relative; flex-shrink: 0; }
        @media (max-width: 768px) { .video-wrapper { height: 40vh; } }
        video { width: 100%; height: 100%; object-fit: contain; }
        .controls-wrapper { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: space-between; transition: 0.4s; opacity: 0; background: radial-gradient(circle at center, transparent 30%, rgba(0,0,0,0.9) 100%); z-index: 20; }
        .video-wrapper.show-controls .controls-wrapper { opacity: 1; }

        .p-header { padding: 20px; display: flex; align-items: center; gap: 15px; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); }
        .p-back-circle { width: 42px; height: 42px; border-radius: 50%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }
        .p-red-pipe { width: 4px; height: 28px; background: var(--primary); border-radius: 2px; }
        .p-name { font-weight: 800; font-size: 1.4rem; color: #fff; text-shadow: 0 2px 10px #000; }
        @media (max-width: 768px) { .p-name { font-size: 1rem; } }

        .center-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: none; border: none; cursor: pointer; transition: 0.3s; z-index: 25; }
        .center-btn:hover { transform: translate(-50%, -50%) scale(1.2); }

        .p-bottom { padding: 25px 30px 40px; background: linear-gradient(to top, rgba(0,0,0,1), transparent); }
        .progress-area { width: 100%; height: 6px; background: rgba(255,255,255,0.2); border-radius: 10px; margin-bottom: 20px; cursor: pointer; }
        .progress-bar { height: 100%; background: var(--primary); width: 0%; border-radius: 10px; transition: 0.1s linear; }
        .p-controls-row { display: flex; justify-content: space-between; align-items: center; color: #fff; }
        .p-live-indicator { display: flex; align-items: center; gap: 8px; font-weight: 900; font-size: 0.9rem; color: white; margin-left: 10px; }

        /* Settings Menu Update for Audio */
        .quality-menu { position: absolute; bottom: 100px; right: 30px; background: #0d1117; border: 1px solid var(--border); border-radius: 20px; overflow: hidden; display: none; min-width: 180px; z-index: 30; padding: 10px 0; }
        .q-title { padding: 10px 20px; font-size: 0.7rem; font-weight: 800; color: var(--text-sec); text-transform: uppercase; letter-spacing: 1px; }
        .q-item { padding: 12px 20px; font-size: 0.9rem; font-weight: 700; cursor: pointer; color: white; }
        .q-item:hover { background: rgba(255,255,255,0.05); }
        .q-item.active { background: var(--primary); color: white; }

        .player-content-scroll { flex-grow: 1; overflow-y: auto; background: var(--bg); padding: 30px 5%; }
        .suggestion-title { font-size: 1.2rem; font-weight: 800; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; color: var(--text-main); }
        .sparkle-red { color: var(--primary); }

        /* --- REQUEST: Upload Box Section --- */
        .upload-container {
            border: 2px dashed var(--border);
            padding: 30px;
            border-radius: 20px;
            margin: 20px 0;
            cursor: pointer;
            background: rgba(255,255,255,0.02);
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .upload-container:hover { border-color: var(--primary); background: rgba(249, 13, 0, 0.03); }
        .upload-container i { color: #fff; opacity: 0.8; }
        .upload-container p { font-weight: 700; font-size: 0.95rem; color: #fff; }

        /* Loader Overlay */
        #loading-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 9000; display: none; align-items: center; justify-content: center; flex-direction: column; gap: 20px; }
        .loader-txt { font-weight: 800; font-size: 1.1rem; color: var(--primary); letter-spacing: 1px; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 75px; background: var(--bg); backdrop-filter: blur(20px); border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 2000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-sec); cursor: pointer; font-size: 0.75rem; font-weight: 800; gap: 4px; }
        .nav-item.active { color: var(--primary); }

        .spinner { width: 45px; height: 45px; border: 4px solid rgba(255,255,255,0.1); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body id="body-main">

    <div id="loading-overlay"><div class="spinner"></div><div class="loader-txt">Your playlist is loading...</div></div>

    <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar(false)"></div>
    <div id="sidebar">
        <div class="brand"><i data-lucide="zap"></i><span>StreamX</span></div>
        <div class="about-box">
            <p>StreamX is a premium OTT engine built for cinematic clarity. Designed by Yash Nemade.</p>
            <div class="dev-tag"><i data-lucide="verified" size="18"></i> Developer: Yash Nemade</div>
        </div>
    </div>

    <header>
        <div class="header-left">
            <div class="hamburger" onclick="toggleSidebar(true)"><i data-lucide="menu"></i></div>
            <div class="brand" onclick="loadBaseM3U()"><i data-lucide="zap"></i><span>StreamX</span></div>
        </div>
        <div class="header-center-search">
            <i data-lucide="search" size="18" color="var(--text-sec)"></i>
            <input type="text" id="laptop-search" placeholder="Search for channels..." oninput="handleSearch(this)">
        </div>
        <div class="header-right">
            <div class="icon-btn search-icon-mobile" onclick="toggleMobileSearch(true)"><i data-lucide="search" size="20"></i></div>
            <div class="icon-btn" onclick="toggleTheme()"><i data-lucide="moon" id="theme-icon" size="20"></i></div>
        </div>
        <div id="search-overlay">
            <i data-lucide="search" size="20"></i>
            <input type="text" id="mobile-search-input" placeholder="Search..." oninput="handleSearch(this)">
            <i data-lucide="x" size="24" style="cursor:pointer" onclick="toggleMobileSearch(false)"></i>
        </div>
    </header>

    <div class="cat-nav"><div id="categories" class="categories"></div></div>
    <div id="channel-grid" class="grid"></div>

    <div id="player-overlay">
        <div class="video-wrapper" id="v-wrap">
            <div id="video-loader" style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background:#000; z-index:15;"><div class="spinner"></div></div>
            <video id="video" playsinline></video>
            <div class="controls-wrapper">
                <div class="p-header">
                    <div class="p-back-circle" onclick="closePlayer()"><i data-lucide="arrow-left" color="white" size="24"></i></div>
                    <div class="p-red-pipe"></div>
                    <div class="p-name" id="p-name-txt">Loading...</div>
                </div>
                <div class="center-btn" onclick="togglePlay()"><i data-lucide="play" id="center-play-icon" color="white" size="45"></i></div>
                <div class="p-bottom">
                    <div class="progress-area" id="p-container"><div class="progress-bar" id="p-bar"></div></div>
                    <div class="p-controls-row">
                        <div style="display:flex; align-items:center; gap:15px;">
                            <i data-lucide="play" id="play-btn" style="cursor:pointer" onclick="togglePlay()"></i>
                            <i data-lucide="volume-2" id="mute-btn" style="cursor:pointer" onclick="toggleMute()"></i>
                            <div class="p-live-indicator"><div class="dot"></div> LIVE</div>
                            <span id="time-display" style="font-size: 0.9rem; font-weight:700; margin-left:10px;">00:00 / 00:00</span>
                        </div>
                        <div style="display:flex; align-items:center; gap:20px;">
                            <i data-lucide="settings" style="cursor:pointer" onclick="toggleSettings()"></i>
                            <i data-lucide="maximize" style="cursor:pointer" onclick="toggleFullScreen()"></i>
                        </div>
                    </div>
                </div>
                <div class="quality-menu" id="quality-menu"></div>
            </div>
        </div>
        <div class="player-content-scroll">
            <h2 class="suggestion-title" id="s-title"></h2>
            <div id="suggestion-grid" class="grid" style="padding: 0;"></div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="loadBaseM3U()"><i data-lucide="home"></i><span>HOME</span></div>
        <div class="nav-item" onclick="toggleModal(true)"><i data-lucide="plus-circle"></i><span>IMPORT</span></div>
    </div>

    <div id="importModal" style="position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:6000; display:none; align-items:center; justify-content:center; padding:20px;">
        <div style="background:var(--surface); border:1px solid var(--border); width:100%; max-width:400px; padding:35px; border-radius:32px; text-align:center;">
            <h2 style="font-weight: 800;">Import Playlist</h2>
            <input type="text" id="m3uUrl" placeholder="Enter M3U URL..." style="width:100%; padding:15px; border-radius:12px; background:var(--bg); border:1px solid var(--border); color:white; margin:15px 0; outline:none;">
            
            <div class="upload-container" onclick="document.getElementById('fileInput').click()">
                <i data-lucide="cloud-upload" size="30"></i>
                <p>Upload M3U File</p>
            </div>
            <input type="file" id="fileInput" style="display:none" accept=".m3u" onchange="loadFile(event)">

            <button onclick="loadUrl()" style="width:100%; padding:18px; border-radius:18px; background:var(--primary); color:white; border:none; font-weight:800; cursor:pointer;">LOAD PLAYLIST</button>
            <p onclick="toggleModal(false)" style="margin-top:20px; color:var(--text-sec); cursor:pointer;">Cancel</p>
        </div>
    </div>

    <script>
        const PROXY = 'https://yashiptvplaylist.bgmihackerr12.workers.dev/?url='; 
        const BASE_M3U = 'https://yashlivetv.fun/app/tsjio_playlist.m3u';
        let hls = null, allChannels = [];
        const video = document.getElementById('video');
        const vWrap = document.getElementById('v-wrap');

        lucide.createIcons();

        function toggleSidebar(s) { document.getElementById('sidebar').classList.toggle('open', s); document.getElementById('overlay').style.display = s ? 'block' : 'none'; }
        function toggleMobileSearch(s) { document.getElementById('search-overlay').style.display = s ? 'flex' : 'none'; if(s) document.getElementById('mobile-search-input').focus(); }
        function showControls() { vWrap.classList.add('show-controls'); clearTimeout(window.controlTimer); window.controlTimer = setTimeout(() => { if (!video.paused) vWrap.classList.remove('show-controls'); }, 3000); }
        vWrap.addEventListener('mousemove', showControls);
        vWrap.addEventListener('touchstart', showControls);

        window.onload = () => fetchPlaylist(BASE_M3U, false);
        function loadBaseM3U() { closePlayer(); fetchPlaylist(BASE_M3U, false); }

        async function fetchPlaylist(url, showLoader = true) {
            if(showLoader) document.getElementById('loading-overlay').style.display = 'flex';
            try {
                const response = await fetch(PROXY + encodeURIComponent(url));
                const data = await response.text();
                parseM3U(data);
            } catch (e) { console.error(e); }
            document.getElementById('loading-overlay').style.display = 'none';
        }

        function parseM3U(content) {
            const channels = [];
            let current = null;
            content.split('\n').forEach(line => {
                line = line.trim();
                if (line.startsWith('#EXTINF:')) {
                    current = { name: line.split(',')[1] || "Unknown", logo: line.match(/tvg-logo="([^"]+)"/)?.[1] || '', group: line.match(/group-title="([^"]+)"/)?.[1] || 'General' };
                } else if (line.startsWith('http') && current) {
                    current.url = line; channels.push(current); current = null;
                }
            });
            allChannels = channels;
            renderCategories();
            renderGrid(allChannels, 'channel-grid');
        }

        function renderGrid(list, target, isMini = false) {
            const grid = document.getElementById(target);
            grid.innerHTML = list.slice(0, isMini ? 12 : 400).map(ch => `
                <div class="card" onclick="playStream('${ch.url}', '${ch.name.replace(/'/g, "\\'")}', '${ch.group}')">
                    <div class="live-tag"><div class="dot"></div> LIVE</div>
                    <div class="poster-box"><img src="${ch.logo}" onerror="this.src='https://img.icons8.com/fluency/96/monitor.png'"></div>
                    <div class="card-info"><h3>${ch.name}</h3></div>
                </div>
            `).join('');
        }

        function renderCategories() {
            const cats = ['All', ...new Set(allChannels.map(c => c.group))];
            document.getElementById('categories').innerHTML = cats.map(cat => `<div class="chip ${cat === 'All' ? 'active' : ''}" onclick="filterCat(this, '${cat}')">${cat}</div>`).join('');
        }

        function filterCat(el, cat) {
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            renderGrid(cat === 'All' ? allChannels : allChannels.filter(c => c.group === cat), 'channel-grid');
        }

        function playStream(url, name, group) {
            document.getElementById('p-name-txt').innerText = name;
            document.getElementById('player-overlay').style.display = 'flex';
            document.getElementById('video-loader').style.display = 'flex';
            if (hls) hls.destroy();
            if (Hls.isSupported()) {
                hls = new Hls(); hls.loadSource(url); hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => { video.play(); setupSettings(); });
            } else { video.src = url; video.play(); }
            document.getElementById('s-title').innerHTML = `<i data-lucide="sparkles" class="sparkle-red"></i> Similar in ${group}`;
            renderGrid(allChannels.filter(c => c.group === group && c.name !== name), 'suggestion-grid', true);
            lucide.createIcons();
            document.querySelector('.player-content-scroll').scrollTo(0,0);
            showControls();
        }

        function setupSettings() {
            const menu = document.getElementById('quality-menu');
            let html = '<div class="q-title">Quality</div>';
            
            const unique = new Set();
            const sortedLevels = hls.levels.map((l, i) => ({...l, index: i})).sort((a, b) => b.height - a.height);
            
            sortedLevels.forEach(l => {
                if (!unique.has(l.height)) {
                    unique.add(l.height);
                    let label = l.height >= 1080 ? "1080 FHD" : l.height >= 720 ? "720 HD" : l.height >= 480 ? "480 SD" : l.height + "p";
                    html += `<div class="q-item ${hls.currentLevel === l.index ? 'active' : ''}" onclick="hls.currentLevel=${l.index}; toggleSettings()">${label}</div>`;
                }
            });

            // Audio Tracks Request
            if (hls.audioTracks && hls.audioTracks.length > 1) {
                html += '<div class="q-title" style="margin-top:10px;">Audio Language</div>';
                hls.audioTracks.forEach((track, id) => {
                    html += `<div class="q-item ${hls.audioTrack === id ? 'active' : ''}" onclick="hls.audioTrack=${id}; toggleSettings()">${track.name || 'Audio ' + id}</div>`;
                });
            }
            menu.innerHTML = html;
        }

        video.addEventListener('timeupdate', () => {
            const pBar = document.getElementById('p-bar');
            const timeDisplay = document.getElementById('time-display');
            if (video.duration) {
                pBar.style.width = (video.currentTime / video.duration) * 100 + '%';
                timeDisplay.innerText = formatTime(video.currentTime) + " / " + formatTime(video.duration);
            } else { timeDisplay.innerText = ""; pBar.style.width = '100%'; }
        });

        function formatTime(s) { let m = Math.floor(s / 60); let sec = Math.floor(s % 60); return (m < 10 ? '0'+m : m) + ":" + (sec < 10 ? '0'+sec : sec); }
        video.onplaying = () => { document.getElementById('video-loader').style.display = 'none'; document.getElementById('center-play-icon').setAttribute('data-lucide', 'pause'); document.getElementById('play-btn').setAttribute('data-lucide', 'pause'); lucide.createIcons(); };
        function togglePlay() { video.paused ? video.play() : video.pause(); const icon = video.paused ? 'play' : 'pause'; document.getElementById('play-btn').setAttribute('data-lucide', icon); document.getElementById('center-play-icon').setAttribute('data-lucide', icon); lucide.createIcons(); }
        function toggleMute() { video.muted = !video.muted; document.getElementById('mute-btn').setAttribute('data-lucide', video.muted ? 'volume-x' : 'volume-2'); lucide.createIcons(); }
        function toggleFullScreen() { if (!document.fullscreenElement) vWrap.requestFullscreen(); else document.exitFullscreen(); }
        function closePlayer() { video.pause(); document.getElementById('player-overlay').style.display = 'none'; }
        function toggleSettings() { const m = document.getElementById('quality-menu'); m.style.display = m.style.display === 'block' ? 'none' : 'block'; }
        function toggleModal(s) { document.getElementById('importModal').style.display = s ? 'flex' : 'none'; }
        function loadUrl() { const u = document.getElementById('m3uUrl').value; if(u) { fetchPlaylist(u, true); toggleModal(false); } }
        
        function loadFile(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            document.getElementById('loading-overlay').style.display = 'flex';
            reader.onload = (ev) => {
                parseM3U(ev.target.result);
                document.getElementById('loading-overlay').style.display = 'none';
                toggleModal(false);
            };
            reader.readAsText(file);
        }

        function handleSearch(inputEl) { renderGrid(allChannels.filter(c => c.name.toLowerCase().includes(inputEl.value.toLowerCase())), 'channel-grid'); }
        function toggleTheme() { document.body.classList.toggle('light-mode'); const icon = document.getElementById('theme-icon'); icon.setAttribute('data-lucide', document.body.classList.contains('light-mode') ? 'sun' : 'moon'); lucide.createIcons(); }
        window.addEventListener('keydown', (e) => { if (document.getElementById('player-overlay').style.display === 'flex') { if (e.key.toLowerCase() === 'f') toggleFullScreen(); if (e.code === 'Space') { e.preventDefault(); togglePlay(); } } });
    </script>
</body>
</html>
